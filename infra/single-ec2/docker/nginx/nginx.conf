# Host-level nginx — installed by EC2 user-data to /etc/nginx/nginx.conf
#
# Path-based routing under a single hostname. CloudFront terminates TLS;
# this nginx is HTTP-only on port 80, locked to the CloudFront prefix list
# at the SG level.
#
# Routes (apex shekharlabs.com):
#   /                         -> 301 https://$host/portal
#   /portal/                  -> Next.js (web :3030, basePath=/portal)
#   /api/intelli-search/      -> :8001
#   /api/agentic-hr/          -> :8002
#   /api/linkedin-generator/  -> :8003
#   /_nuxt/                   -> NocoDB :8080 (root-relative Nuxt assets)
#   = /nocodb, = /nocodb/     -> 302 to NocoDB Shared View (anonymous, read-only)
#   /nocodb/                  -> NocoDB :8080 (SPA subpath sub_filters only)
#   = /gitea, = /gitea/       -> 302 to /gitea/explore/repos (anonymous)
#   /gitea/                   -> Gitea :3000
#   = /mattermost, = /mattermost/ -> mm-minter :8088 (mints MM session cookies)
#   /mattermost/              -> Mattermost :8065
#   /healthz                  -> 200 ok
#
# Anonymous-tools posture (post-2026-05): no credentials are ever injected
# into served HTML. NocoDB uses its native Shared View, Gitea uses native
# anonymous browsing (REQUIRE_SIGNIN_VIEW=false), Mattermost uses an out-of-
# band session minter sidecar. Do NOT re-add `sub_filter '</head>' '<script>...'`
# blocks that POST credentials from the browser.

worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  sendfile         on;
  tcp_nopush       on;
  tcp_nodelay      on;
  keepalive_timeout 75s;

  # Generous timeouts so SSE / polling keep working
  proxy_connect_timeout 30s;
  proxy_send_timeout    180s;
  proxy_read_timeout    180s;
  send_timeout          180s;

  # Gzip for text payloads
  gzip on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain text/css application/json application/javascript
    text/xml application/xml application/xml+rss text/javascript
    application/x-font-ttf font/opentype image/svg+xml;
  gzip_vary on;

  # CloudFront forwards real client IP via X-Forwarded-For
  set_real_ip_from 0.0.0.0/0;
  real_ip_header X-Forwarded-For;
  real_ip_recursive on;

  # WebSocket / SSE upgrade map
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80 default_server;
    server_name _;

    # ----- Root: send users into the portal -----
    location = / {
      return 301 https://$host/portal;
    }

    # Match Next.js canonical basePath without trailing slash to avoid
    # nginx's implicit /portal -> /portal/ redirect loop through CloudFront.
    location = /portal {
      proxy_pass http://127.0.0.1:3030/portal;
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 86400;
    }

    # Liveness for the host itself
    location = /healthz {
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # ----- Next.js portfolio (basePath=/portal) -----
    location /portal/ {
      proxy_pass http://127.0.0.1:3030/portal/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 86400;
    }

    # ----- API: intelli-search (SSE) -----
    location /api/intelli-search/ {
      proxy_pass http://127.0.0.1:8001/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Connection        "";
      proxy_buffering off;
      proxy_cache off;
    }

    # ----- API: agentic-hr -----
    location /api/agentic-hr/ {
      proxy_pass http://127.0.0.1:8002/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    # ----- API: linkedin-generator -----
    location /api/linkedin-generator/ {
      proxy_pass http://127.0.0.1:8003/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    # ----- NocoDB Nuxt assets (root-relative paths from NocoDB HTML) -----
    location /_nuxt/ {
      proxy_pass http://127.0.0.1:8080/_nuxt/;
      proxy_set_header Host              $host;
      proxy_set_header X-Forwarded-Host  $host;
      proxy_set_header X-Forwarded-Prefix /nocodb;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    # ----- NocoDB landing: anonymous Shared View -----
    # Visitors hitting /nocodb or /nocodb/ are sent to the public Shared View
    # URL created in the NocoDB UI (Base → View → Share → "Public Shared View").
    # No credentials are injected; NocoDB enforces read-only natively.
    # TODO(ops): replace the path below with the share-view URL from NocoDB UI
    #            after a fresh install. Example: /nocodb/nc/view/abc123def456
    location = /nocodb  { return 302 https://$host/nocodb/nc/view/REPLACE_WITH_NOCODB_SHARED_VIEW_ID; }
    location = /nocodb/ { return 302 https://$host/nocodb/nc/view/REPLACE_WITH_NOCODB_SHARED_VIEW_ID; }

    # ----- NocoDB (proxied through CloudFront) -----
    location /nocodb/ {
      proxy_pass http://127.0.0.1:8080/;

      # SPA config rewrites for /nocodb/ subpath. These are HTML-rewrite-only,
      # not credential-bearing — the Nuxt bundle needs them to load assets
      # through the /nocodb/ prefix.
      sub_filter 'ncBackendUrl:""' 'ncBackendUrl:"/nocodb"';
      sub_filter 'baseURL:"/"'    'baseURL:"/nocodb/"';
      sub_filter_once off;
      proxy_set_header Accept-Encoding "";

      # Fix cookie and redirect paths for subpath
      proxy_cookie_path ~^/(.+)$ /nocodb/$1;
      proxy_redirect / /nocodb/;

      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Forwarded-Host  $host;
      proxy_set_header X-Forwarded-Prefix /nocodb;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 86400;
    }

    # ----- Gitea landing: anonymous explore page -----
    # Gitea's "/" renders a login-prompted dashboard for unauthenticated visitors.
    # Skip it and drop visitors on /explore/repos, which is fully anonymous-
    # browseable when service.REQUIRE_SIGNIN_VIEW=false (set in compose).
    location = /gitea  { return 302 https://$host/gitea/explore/repos; }
    location = /gitea/ { return 302 https://$host/gitea/explore/repos; }

    # ----- Gitea (proxied through CloudFront) -----
    location /gitea/ {
      proxy_pass http://127.0.0.1:3000/;
      proxy_set_header Accept-Encoding "";

      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 86400;
    }

    # ----- Mattermost landing: server-side session minter -----
    # First-time visitors hitting /mattermost or /mattermost/ are sent to the
    # mm-minter sidecar. The minter logs in to Mattermost as the demo user
    # (creds from container env, NEVER in served HTML), sets MMAUTHTOKEN +
    # MMUSERID cookies on the visitor's response, then 302s to the landing
    # channel. The catch-all /mattermost/ block below handles every subsequent
    # request normally — the cookies make the visitor look authenticated.
    location = /mattermost {
      proxy_pass http://127.0.0.1:8088/mint;
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
    }
    location = /mattermost/ {
      proxy_pass http://127.0.0.1:8088/mint;
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
    }

    # ----- Mattermost (proxied through CloudFront) -----
    # No trailing slash on proxy_pass — Mattermost serves under /mattermost/
    # when SITEURL is set. No sub_filter and no CSP override here: the minter
    # took the auto-login responsibility, so MM's own CSP stays intact.
    location /mattermost/ {
      proxy_pass http://127.0.0.1:8065;

      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 86400;
    }
  }
}
