# Host-level nginx — installed by EC2 user-data to /etc/nginx/nginx.conf
#
# Path-based routing under a single hostname. CloudFront terminates TLS;
# this nginx is HTTP-only on port 80, locked to the CloudFront prefix list
# at the SG level.
#
# Routes (apex shekharlabs.com):
#   /                         -> 301 https://$host/portal
#   /portal/                  -> Next.js (web :3030, basePath=/portal)
#   /api/intelli-search/      -> :8001
#   /api/agentic-hr/          -> :8002
#   /api/linkedin-generator/  -> :8003
#   /_nuxt/                   -> NocoDB :8080 (root-relative Nuxt assets)
#   /nocodb/                  -> NocoDB :8080 with sub_filter rewrites + auto-login
#   /gitea/                   -> Gitea :3000 with auto-login
#   /mattermost/              -> Mattermost :8065 with CSP override + auto-login
#   /healthz                  -> 200 ok

worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  sendfile         on;
  tcp_nopush       on;
  tcp_nodelay      on;
  keepalive_timeout 75s;

  # Generous timeouts so SSE / polling keep working
  proxy_connect_timeout 30s;
  proxy_send_timeout    180s;
  proxy_read_timeout    180s;
  send_timeout          180s;

  # Gzip for text payloads
  gzip on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain text/css application/json application/javascript
    text/xml application/xml application/xml+rss text/javascript
    application/x-font-ttf font/opentype image/svg+xml;
  gzip_vary on;

  # CloudFront forwards real client IP via X-Forwarded-For
  set_real_ip_from 0.0.0.0/0;
  real_ip_header X-Forwarded-For;
  real_ip_recursive on;

  # WebSocket / SSE upgrade map
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80 default_server;
    server_name _;

    # ----- Root: send users into the portal -----
    location = / {
      return 301 https://$host/portal;
    }

    # Match Next.js canonical basePath without trailing slash to avoid
    # nginx's implicit /portal -> /portal/ redirect loop through CloudFront.
    location = /portal {
      proxy_pass http://127.0.0.1:3030/portal;
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 86400;
    }

    # Liveness for the host itself
    location = /healthz {
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # ----- Next.js portfolio (basePath=/portal) -----
    location /portal/ {
      proxy_pass http://127.0.0.1:3030/portal/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 86400;
    }

    # ----- API: intelli-search (SSE) -----
    location /api/intelli-search/ {
      proxy_pass http://127.0.0.1:8001/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Connection        "";
      proxy_buffering off;
      proxy_cache off;
    }

    # ----- API: agentic-hr -----
    location /api/agentic-hr/ {
      proxy_pass http://127.0.0.1:8002/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    # ----- API: linkedin-generator -----
    location /api/linkedin-generator/ {
      proxy_pass http://127.0.0.1:8003/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    # ----- NocoDB Nuxt assets (root-relative paths from NocoDB HTML) -----
    location /_nuxt/ {
      proxy_pass http://127.0.0.1:8080/_nuxt/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    # ----- NocoDB (proxied through CloudFront) -----
    location /nocodb/ {
      proxy_pass http://127.0.0.1:8080/;

      # SPA config rewrites for /nocodb/ subpath
      sub_filter 'ncBackendUrl:""' 'ncBackendUrl:"/nocodb"';
      sub_filter 'baseURL:"/"'    'baseURL:"/nocodb/"';
      # Auto-login and land on the requested page after auth
      sub_filter '</head>' '<script>(function(){var t="/nocodb/w6o5282d/ptguko14rzuuxhg";var p=location.pathname;if(document.cookie.indexOf("nocodb-token=")>-1){if(p==="/nocodb/"||p==="/nocodb")location.replace(t);return}fetch("/nocodb/api/v1/auth/user/signin",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:"shekhar.dudi@demo.local",password:"agentic_hr"}),credentials:"include"}).then(function(r){return r.json()}).then(function(d){if(d.token){document.cookie="nocodb-token="+d.token+";path=/;max-age=86400";location.replace(t)}}).catch(function(){})})();</script></head>';
      sub_filter_once off;
      proxy_set_header Accept-Encoding "";

      # Fix cookie and redirect paths for subpath
      proxy_cookie_path ~^/(.+)$ /nocodb/$1;
      proxy_redirect / /nocodb/;

      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 86400;
    }

    # ----- Gitea (proxied through CloudFront) -----
    location /gitea/ {
      proxy_pass http://127.0.0.1:3000/;

      # Auto-login and land on the requested page after auth
      sub_filter '</head>' '<script>(async function(){try{var k="gitea_auto_login_once";var t="/gitea/explore/users";var p=location.pathname;var r=await fetch("/gitea/api/v1/user",{credentials:"include",cache:"no-store"});if(r.ok){sessionStorage.removeItem(k);if(p==="/gitea/"||p==="/gitea")location.replace(t);return}if(sessionStorage.getItem(k)==="1")return;var l=await fetch("/gitea/user/login",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"user_name=shekhar&password=agentic_hr",credentials:"include"});if(l.ok||l.redirected){sessionStorage.setItem(k,"1");location.replace(t)}}catch(e){}})();</script></head>';
      proxy_set_header Accept-Encoding "";

      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 86400;
    }

    # ----- Mattermost (proxied through CloudFront) -----
    # No trailing slash on proxy_pass — Mattermost serves under /mattermost/
    # when SITEURL is set.
    location /mattermost/ {
      proxy_pass http://127.0.0.1:8065;

      # Auto-login and land on the requested page after auth.
      # MM returns its token in a response header, not Set-Cookie — set
      # MMAUTHTOKEN manually so subsequent requests authenticate.
      sub_filter '</head>' '<script>(async function(){try{var d="/mattermost/engineering/channels/Engineering";var p=location.pathname;var m=document.cookie.match(/MMAUTHTOKEN=([^;]+)/);if(m){var r=await fetch("/mattermost/api/v4/users/me",{headers:{"Authorization":"Bearer "+m[1]}});if(r.ok){if(p==="/mattermost/"||p==="/mattermost")location.replace(d);return}}var l=await fetch("/mattermost/api/v4/users/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({login_id:"shekhar.dudi@demo.local",password:"agentic_hr"})});if(l.ok){var t=l.headers.get("Token");if(t){var b=await l.json();document.cookie="MMAUTHTOKEN="+t+";path=/;max-age=86400";if(b&&b.id)document.cookie="MMUSERID="+b.id+";path=/;max-age=86400";location.replace(d)}}}catch(e){}})();</script></head>';
      # Add our script hash to CSP so the auto-login script is allowed
      sub_filter "script-src 'self' 'sha256-v8G7NQp0cUTkL+hkNrHt5IFFphUUJBpQFNAYKlP9m+w='" "script-src 'self' 'sha256-v8G7NQp0cUTkL+hkNrHt5IFFphUUJBpQFNAYKlP9m+w=' 'sha256-MVXjvsj9+bYJ8dcpx7ajaEMjomuykCTwUVQhmBBSnqk='";
      sub_filter_once off;
      proxy_set_header Accept-Encoding "";

      # Override CSP response header to include our script hash
      proxy_hide_header Content-Security-Policy;
      add_header Content-Security-Policy "frame-ancestors 'self'; script-src 'self' 'sha256-v8G7NQp0cUTkL+hkNrHt5IFFphUUJBpQFNAYKlP9m+w=' 'sha256-MVXjvsj9+bYJ8dcpx7ajaEMjomuykCTwUVQhmBBSnqk='" always;

      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 86400;
    }
  }
}
