# Host-level nginx config — installed by EC2 user-data to /etc/nginx/nginx.conf
# Routes:
#   api.shekharlabs.com         -> /intelli-search/*, /agentic-hr/*, /linkedin-generator/*
#   dashboards.shekharlabs.com  -> :5601 (basic auth)
#
# CloudFront sits in front of these, so:
#   - SSL terminates at CloudFront (here we still listen on 443 for direct hits + ACM-issued cert)
#   - Real client IP comes from CloudFront-Viewer-Address / X-Forwarded-For
#   - We trust CloudFront managed prefix-list addresses (locked down by SG)

worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  sendfile         on;
  tcp_nopush       on;
  tcp_nodelay      on;
  keepalive_timeout 75s;

  # Generous timeouts so /linkedin-generator polling and SSE both work cleanly
  proxy_connect_timeout 30s;
  proxy_send_timeout    180s;
  proxy_read_timeout    180s;
  send_timeout          180s;

  # Gzip for JSON / HTML responses
  gzip on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain text/css application/json application/javascript
    text/xml application/xml application/xml+rss text/javascript
    application/x-font-ttf font/opentype image/svg+xml;
  gzip_vary on;

  # Trust CloudFront for real client IP
  set_real_ip_from 0.0.0.0/0;
  real_ip_header X-Forwarded-For;
  real_ip_recursive on;

  # ---------- Redirects ----------
  server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ---------- API: api.shekharlabs.com ----------
  server {
    listen 443 ssl http2;
    server_name api.shekharlabs.com;

    ssl_certificate     /etc/letsencrypt/live/api.shekharlabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.shekharlabs.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Browser CORS (CloudFront passes through)
    add_header Access-Control-Allow-Origin  "https://shekharlabs.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # ---- intelli-search ----
    location /intelli-search/ {
      proxy_pass http://127.0.0.1:8001/;          # trailing slash strips prefix
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      # SSE: keep connection open, don't buffer
      proxy_buffering off;
      proxy_cache off;
      proxy_set_header Connection "";
    }

    # ---- agentic-hr ----
    location /agentic-hr/ {
      proxy_pass http://127.0.0.1:8002/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    # NocoDB / Gitea / Mattermost subpaths fronted via agentic-hr namespace
    location /agentic-hr/nocodb/     { proxy_pass http://127.0.0.1:8080/; }
    location /agentic-hr/gitea/      { proxy_pass http://127.0.0.1:3000/; }
    location /agentic-hr/mattermost/ { proxy_pass http://127.0.0.1:8065/; }

    # ---- linkedin-generator ----
    location /linkedin-generator/ {
      proxy_pass http://127.0.0.1:8003/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    # Liveness for the host itself (not any backend)
    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
  }

  # ---------- OpenSearch Dashboards: dashboards.shekharlabs.com ----------
  server {
    listen 443 ssl http2;
    server_name dashboards.shekharlabs.com;

    ssl_certificate     /etc/letsencrypt/live/dashboards.shekharlabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboards.shekharlabs.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    auth_basic           "OpenSearch Dashboards";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
      proxy_pass http://127.0.0.1:5601;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        "upgrade";
    }
  }
}
