# Combined production runtime — single EC2 host (t3.xlarge).
#
# Conventions
#   - Data services bind to 127.0.0.1 only; backends reach them by service name.
#   - Each backend reads its own env file (no shared root .env).
#   - Host ports: 3030 (web) / 8001 / 8002 / 8003 — proxied by host-level nginx.
#   - All build contexts are RELATIVE TO THIS FILE (../../services/...).

name: portfolio

networks:
  portfolio:
    driver: bridge

volumes:
  opensearch-data:
  redis-data:
  pgdata:
  nocodb-data:
  gitea-data:
  mattermost-data:
  mattermost-config:

services:

  # ==========================================================================
  # intelli-search stack
  # ==========================================================================
  opensearch:
    image: opensearchproject/opensearch:3.5.0
    container_name: portfolio-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms3g -Xmx3g"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD:-MySecurePassword123!}
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "127.0.0.1:9200:9200"     # localhost-only; SSH tunnel for remote ingest
    networks: [portfolio]

  redis:
    image: redis:7-alpine
    container_name: portfolio-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [portfolio]

  intelli-search:
    build:
      context: /opt/portfolio/services/intelli-search
      dockerfile: Dockerfile
    container_name: portfolio-intelli-search
    env_file: env/intelli-search.env
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      - opensearch
      - redis
    restart: unless-stopped
    networks: [portfolio]

  # ==========================================================================
  # agentic-hr stack
  # ==========================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: portfolio-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentic_hr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentic_hr_dev}
      POSTGRES_DB: ${POSTGRES_DB:-agentic_hr}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - /opt/portfolio/services/agentic-hr/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - /opt/portfolio/services/agentic-hr/agentic_hr_db.dump:/docker-entrypoint-initdb.d/agentic_hr_db.dump:ro
    ports:
      - "0.0.0.0:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentic_hr}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      portfolio:
        aliases:
          - portfolio-postgres

  nocodb:
    image: nocodb/nocodb:latest
    container_name: portfolio-nocodb
    environment:
      NC_DB: "pg://postgres:5432?u=${POSTGRES_USER:-agentic_hr}&p=${POSTGRES_PASSWORD:-agentic_hr_dev}&d=nocodb"
      NC_AUTH_JWT_SECRET: ${NOCODB_JWT_SECRET:-portfolio-nocodb-jwt}
      NC_PUBLIC_URL: ${NOCODB_PUBLIC_URL:-https://shekharlabs.com/nocodb/}
      NC_ALLOW_LOCAL_EXTERNAL_DBS: ${NC_ALLOW_LOCAL_EXTERNAL_DBS:-true}
    volumes:
      - nocodb-data:/usr/app/data
    ports:
      - "0.0.0.0:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [portfolio]

  gitea:
    image: gitea/gitea:latest
    container_name: portfolio-gitea
    environment:
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: ${POSTGRES_USER:-agentic_hr}
      GITEA__database__PASSWD: ${POSTGRES_PASSWORD:-agentic_hr_dev}
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL:-https://shekharlabs.com/gitea/}
      GITEA__server__SSH_DOMAIN: ${GITEA_SSH_DOMAIN:-shekharlabs.com}
      GITEA__server__SSH_PORT: "2222"
      # Anonymous-browse posture: visitors see public repos without login.
      # Push still requires the demo account; registration is closed.
      GITEA__service__REQUIRE_SIGNIN_VIEW: "false"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__service__SHOW_REGISTRATION_BUTTON: "false"
      GITEA__service__ENABLE_NOTIFY_MAIL: "false"
    volumes:
      - gitea-data:/data
    ports:
      - "0.0.0.0:3000:3000"
      - "0.0.0.0:2222:22"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [portfolio]

  mattermost:
    image: mattermost/mattermost-team-edition:11.5.1
    container_name: portfolio-mattermost
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: "postgres://${POSTGRES_USER:-agentic_hr}:${POSTGRES_PASSWORD:-agentic_hr_dev}@postgres:5432/mattermost?sslmode=disable&connect_timeout=10"
      MM_SERVICESETTINGS_SITEURL: ${MATTERMOST_SITE_URL:-https://shekharlabs.com/mattermost}
      MM_SERVICESETTINGS_ENABLEBOTACCOUNTCREATION: "true"
      MM_SERVICESETTINGS_ENABLEINCOMINGWEBHOOKS: "true"
      MM_SERVICESETTINGS_ENABLEOUTGOINGWEBHOOKS: "true"
      MM_PLUGINSETTINGS_ENABLEUPLOADS: "true"
    volumes:
      - mattermost-data:/mattermost/data
      - mattermost-config:/mattermost/config
    ports:
      - "0.0.0.0:8065:8065"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [portfolio]

  # Server-side session minter: logs in to Mattermost as the demo user using
  # env-loaded credentials, sets MM cookies on the visitor's response, and
  # 302s to the configured landing channel. Replaces the old nginx sub_filter
  # auto-login script so no credentials are ever served in HTML/JS.
  mm-minter:
    build:
      context: ./mm-minter
      dockerfile: Dockerfile
    container_name: portfolio-mm-minter
    env_file: env/mm-minter.env
    environment:
      # Must include the /mattermost subpath because MM's SITEURL is set with
      # that prefix; bare /api/v4/users/login 302s to /mattermost/api/v4/...
      MM_INTERNAL_URL: http://mattermost:8065/mattermost
      MM_DEFAULT_NEXT: /mattermost/engineering/channels/Engineering
    ports:
      # Host nginx reaches the minter via 127.0.0.1:8088; not exposed beyond.
      - "127.0.0.1:8088:8088"
    depends_on:
      - mattermost
    networks: [portfolio]

  agentic-hr:
    build:
      context: /opt/portfolio/services/agentic-hr/backend
      dockerfile: Dockerfile
    container_name: portfolio-agentic-hr
    env_file: env/agentic-hr.env
    environment:
      BACKEND_PORT: "8000"
    ports:
      - "127.0.0.1:8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks: [portfolio]

  # ==========================================================================
  # linkedin-generator (stateless)
  # ==========================================================================
  linkedin-generator:
    build:
      context: /opt/portfolio/services/linkedin-generator
      dockerfile: Dockerfile
    container_name: portfolio-linkedin-generator
    env_file: env/linkedin-generator.env
    ports:
      - "127.0.0.1:8003:8000"
    restart: unless-stopped
    networks: [portfolio]

  # ==========================================================================
  # web — Next.js portfolio (basePath=/portal, served by nginx /portal/)
  # ==========================================================================
  web:
    build:
      context: /opt/portfolio/apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${WEB_API_BASE_URL:-https://shekharlabs.com}
        NEXT_PUBLIC_INTELLI_SEARCH_API: ${WEB_INTELLI_SEARCH_API:-https://shekharlabs.com/api/intelli-search}
        NEXT_PUBLIC_AGENTIC_HR_API: ${WEB_AGENTIC_HR_API:-https://shekharlabs.com/api/agentic-hr}
        NEXT_PUBLIC_LINKEDIN_API: ${WEB_LINKEDIN_API:-https://shekharlabs.com/api/linkedin-generator}
        # Agentic HR integration chip targets — must be browser-reachable URLs.
        # In prod we route through nginx subpaths (CloudFront -> EC2:80 -> nginx).
        NEXT_PUBLIC_NOCO_URL: ${WEB_NOCO_URL:-https://shekharlabs.com/nocodb/}
        NEXT_PUBLIC_GITEA_URL: ${WEB_GITEA_URL:-https://shekharlabs.com/gitea/}
        NEXT_PUBLIC_MATTERMOST_URL: ${WEB_MATTERMOST_URL:-https://shekharlabs.com/mattermost/}

    container_name: portfolio-web
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "127.0.0.1:3030:3000"
    restart: unless-stopped
    networks: [portfolio]
