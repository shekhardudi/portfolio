version: "3.9"

name: portfolio-local

networks:
  portfolio:
    driver: bridge

volumes:
  opensearch-data:
  redis-data:
  pgdata:
  pgdata-collab:
  nocodb-data:
  gitea-data:
  mattermost-data:
  mattermost-config:
  mattermost-logs:
  mattermost-plugins:
  mattermost-client-plugins:

services:
  opensearch:
    image: opensearchproject/opensearch:3.5.0
    container_name: portfolio-local-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms3g -Xmx3g"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD:-MySecurePassword123!}
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    networks: [portfolio]

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: portfolio-local-opensearch-dashboards
    depends_on:
      - opensearch
    environment:
      OPENSEARCH_HOSTS: '["https://portfolio-local-opensearch:9200"]'
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:-MySecurePassword123!}
    ports:
      - "5601:5601"
    restart: unless-stopped
    networks: [portfolio]

  redis:
    image: redis:7-alpine
    container_name: portfolio-local-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [portfolio]

  postgres:
    image: pgvector/pgvector:pg16
    container_name: portfolio-local-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentic_hr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentic_hr_dev}
      POSTGRES_DB: ${POSTGRES_DB:-agentic_hr}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../../services/agentic-hr/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - ../../../services/agentic-hr/agentic_hr_db.dump:/docker-entrypoint-initdb.d/agentic_hr_db.dump:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentic_hr}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [portfolio]

  nocodb:
    image: nocodb/nocodb:latest
    container_name: portfolio-local-nocodb
    ports:
      - "8080:8080"
    environment:
      NC_DB: pg://postgres:5432?u=${POSTGRES_USER:-agentic_hr}&p=${POSTGRES_PASSWORD:-agentic_hr_dev}&d=nocodb
      NC_AUTH_JWT_SECRET: ${NOCODB_JWT_SECRET:-agentic-hr-nocodb-jwt-secret}
      NC_ALLOW_LOCAL_HOOKS: "true"
      NC_ALLOW_LOCAL_EXTERNAL_DBS: "true"
      NC_PUBLIC_URL: ${NOCODB_PUBLIC_URL:-http://localhost:8080}
    volumes:
      - nocodb-data:/usr/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks: [portfolio]

  gitea:
    image: gitea/gitea:1.22
    container_name: portfolio-local-gitea
    ports:
      - "3001:3000"
      - "2222:22"
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: ${POSTGRES_USER:-agentic_hr}
      GITEA__database__PASSWD: ${POSTGRES_PASSWORD:-agentic_hr_dev}
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL:-http://localhost:3001/}
      GITEA__server__SSH_DOMAIN: localhost
      GITEA__server__SSH_PORT: "2222"
    volumes:
      - gitea-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks: [portfolio]

  mattermost:
    image: mattermost/mattermost-team-edition:latest
    container_name: portfolio-local-mattermost
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8065:8065"
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://${POSTGRES_USER:-agentic_hr}:${POSTGRES_PASSWORD:-agentic_hr_dev}@postgres:5432/mattermost?sslmode=disable&connect_timeout=10
      MM_SERVICESETTINGS_SITEURL: ${MATTERMOST_SITE_URL:-http://localhost:8065}
      MM_SERVICESETTINGS_ENABLEBOTACCOUNTCREATION: "true"
      MM_SERVICESETTINGS_ENABLEINCOMINGWEBHOOKS: "true"
      MM_SERVICESETTINGS_ENABLEOUTGOINGWEBHOOKS: "true"
      MM_PLUGINSETTINGS_ENABLEUPLOADS: "true"
    volumes:
      - mattermost-data:/mattermost/data
      - mattermost-config:/mattermost/config
      - mattermost-logs:/mattermost/logs
      - mattermost-plugins:/mattermost/plugins
      - mattermost-client-plugins:/mattermost/client/plugins
    restart: unless-stopped
    networks: [portfolio]

